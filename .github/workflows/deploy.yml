# Build the API image on GitHub Actions (fast, cached), push to GHCR, then pull on the droplet.
# The app keeps running during the image build; only the pull + container recreate causes a short blip.

name: Deploy with Docker

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

# One deploy at a time (avoids two runs fighting over :latest on the server).
concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      # Immutable tag — always matches this workflow run (avoids stale :latest on pull).
      deploy_image: ${{ steps.image.outputs.full_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Image name (GHCR requires lowercase)
        id: image
        run: |
          LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          BASE="${{ env.REGISTRY }}/$LOWER"
          echo "IMAGE_BASE=$BASE" >> "$GITHUB_OUTPUT"
          echo "full_sha=$BASE:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.image.outputs.IMAGE_BASE }}:latest
            ${{ steps.image.outputs.IMAGE_BASE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Pull and run on server
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy to Digital Ocean
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_IMAGE: ${{ needs.build-push.outputs.deploy_image }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          timeout: 2m
          envs: DEPLOY_IMAGE,GHCR_USER,GHCR_TOKEN
          script: |
            set -e
            echo "🚀 Deploying image: $DEPLOY_IMAGE"

            cd /var/www/roomrental-api

            echo "📥 Syncing compose and repo files..."
            git config --global --add safe.directory /var/www/roomrental-api
            git fetch origin
            git reset --hard origin/main || git reset --hard origin/master
            git clean -fd

            echo "🛑 Stopping PM2 (if any)..."
            pm2 delete roomrental-api 2>/dev/null || true
            pm2 save 2>/dev/null || true

            if ! command -v docker &> /dev/null; then
              echo "📦 Installing Docker..."
              curl -fsSL https://get.docker.com -o get-docker.sh
              sh get-docker.sh
              usermod -aG docker "$USER" || true
              systemctl enable docker
              systemctl start docker
              rm -f get-docker.sh
            fi

            if docker compose version &>/dev/null; then
              DC="docker compose"
            elif command -v docker-compose &>/dev/null; then
              DC="docker-compose"
            else
              echo "📦 Installing Docker Compose plugin..."
              mkdir -p /usr/local/lib/docker/cli-plugins
              curl -sSL "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-$(uname -m)" -o /usr/local/lib/docker/cli-plugins/docker-compose
              chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
              DC="docker compose"
            fi

            mkdir -p logs

            echo "🔐 Logging in to GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            export ROOMRENTAL_API_IMAGE="$DEPLOY_IMAGE"

            echo "📥 Pulling image $DEPLOY_IMAGE ..."
            docker pull "$DEPLOY_IMAGE"
            $DC -f docker-compose.prod.yml pull api

            echo "🗄️ Running migrations (one-off container)..."
            # Use bundled Prisma CLI (./node_modules/.bin/prisma). Plain `npx prisma` can fetch Prisma 7+ and break a v6 schema.
            docker run --rm \
              --env-file .env \
              "$DEPLOY_IMAGE" \
              sh -c "cd /app && ./node_modules/.bin/prisma migrate deploy"

            echo "🚀 Recreating API container..."
            # Prefer Compose wait (uses service healthcheck); fallback to curl loop on older Compose.
            if $DC -f docker-compose.prod.yml up -d --help 2>&1 | grep -q -- '--wait'; then
              $DC -f docker-compose.prod.yml up -d --wait --wait-timeout 180
            else
              $DC -f docker-compose.prod.yml up -d
            fi

            echo "🧹 Pruning dangling images..."
            docker image prune -f

            echo "⏳ Verifying http://localhost:5000/api/health ..."
            sleep 5

            if ! docker ps --format '{{.Names}}' | grep -qx 'roomrental-api'; then
              echo "❌ Container roomrental-api is not running"
              docker ps -a | grep roomrental-api || true
              docker logs --tail 120 roomrental-api 2>/dev/null || true
              exit 1
            fi

            HEALTH_URL="http://127.0.0.1:5000/api/health"
            for i in $(seq 1 25); do
              set +e
              HTTP_CODE=$(curl -sS -o /tmp/health.json -w "%{http_code}" "$HEALTH_URL" 2>/tmp/curl.err)
              CURL_EXIT=$?
              set -e
              if [ "$CURL_EXIT" -ne 0 ] || [ -z "$HTTP_CODE" ]; then
                HTTP_CODE="000"
              fi
              if [ "$HTTP_CODE" = "200" ]; then
                echo "✅ Deployment successful (HTTP $HTTP_CODE)"
                head -c 300 /tmp/health.json 2>/dev/null || true
                echo
                docker ps | grep roomrental-api
                exit 0
              fi
              echo "Attempt $i/25: HTTP $HTTP_CODE — $(head -c 200 /tmp/curl.err 2>/dev/null | tr '\n' ' ')"
              sleep 3
            done

            echo "⚠️ Health check failed after 25 attempts"
            echo "--- curl stderr ---"
            cat /tmp/curl.err 2>/dev/null || true
            echo "--- container logs ---"
            docker logs --tail 120 roomrental-api 2>/dev/null || true
            echo "--- docker inspect (state) ---"
            docker inspect roomrental-api --format '{{json .State}}' 2>/dev/null || true
            exit 1
