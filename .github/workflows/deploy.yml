# Build the API image on GitHub Actions (fast, cached), push to GHCR, then pull on the droplet.
# The app keeps running during the image build; only the pull + container recreate causes a short blip.

name: Deploy with Docker

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      deploy_image: ${{ steps.image.outputs.full }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Image name (GHCR requires lowercase)
        id: image
        run: |
          LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_BASE=${{ env.REGISTRY }}/$LOWER" >> "$GITHUB_OUTPUT"
          echo "full=${{ env.REGISTRY }}/$LOWER:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.image.outputs.IMAGE_BASE }}:latest
            ${{ steps.image.outputs.IMAGE_BASE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Pull and run on server
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy to Digital Ocean
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_IMAGE: ${{ needs.build-push.outputs.deploy_image }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          timeout: 2m
          envs: DEPLOY_IMAGE,GHCR_USER,GHCR_TOKEN
          script: |
            set -e
            echo "🚀 Deploying image: $DEPLOY_IMAGE"

            cd /var/www/roomrental-api

            echo "📥 Syncing compose and repo files..."
            git config --global --add safe.directory /var/www/roomrental-api
            git fetch origin
            git reset --hard origin/main || git reset --hard origin/master
            git clean -fd

            echo "🛑 Stopping PM2 (if any)..."
            pm2 delete roomrental-api 2>/dev/null || true
            pm2 save 2>/dev/null || true

            if ! command -v docker &> /dev/null; then
              echo "📦 Installing Docker..."
              curl -fsSL https://get.docker.com -o get-docker.sh
              sh get-docker.sh
              usermod -aG docker "$USER" || true
              systemctl enable docker
              systemctl start docker
              rm -f get-docker.sh
            fi

            if docker compose version &>/dev/null; then
              DC="docker compose"
            elif command -v docker-compose &>/dev/null; then
              DC="docker-compose"
            else
              echo "📦 Installing Docker Compose plugin..."
              mkdir -p /usr/local/lib/docker/cli-plugins
              curl -sSL "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-$(uname -m)" -o /usr/local/lib/docker/cli-plugins/docker-compose
              chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
              DC="docker compose"
            fi

            mkdir -p logs

            echo "🔐 Logging in to GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            export ROOMRENTAL_API_IMAGE="$DEPLOY_IMAGE"

            echo "📥 Pulling new image (old container keeps serving until up -d)..."
            $DC -f docker-compose.prod.yml pull api

            echo "🗄️ Running migrations (one-off container)..."
            docker run --rm \
              --env-file .env \
              "$DEPLOY_IMAGE" \
              sh -c "npx prisma migrate deploy"

            echo "🚀 Recreating API container..."
            $DC -f docker-compose.prod.yml up -d

            echo "🧹 Pruning dangling images..."
            docker image prune -f

            echo "⏳ Waiting for health..."
            sleep 8

            if docker ps | grep -q roomrental-api; then
              for i in $(seq 1 15); do
                if curl -fsS http://localhost:5000/api/health > /dev/null 2>&1; then
                  echo "✅ Deployment successful."
                  docker ps | grep roomrental-api
                  exit 0
                fi
                echo "Attempt $i/15: waiting for /api/health..."
                sleep 3
              done
              echo "⚠️ Health check failed"
              docker logs --tail 80 roomrental-api
              exit 1
            else
              echo "❌ Container not running"
              docker logs --tail 80 roomrental-api || true
              exit 1
            fi
